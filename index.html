<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>mateTimer - v20 Final</title>
    <style>
        :root {
            --primary-color: #2b0080;
            --bg-glass: rgba(255, 255, 255, 0.7);
        }
        body {
            margin: 0; padding: 0;
            background-image: url('backimage/back_image.png');
            background-size: cover; background-position: center;
            height: 100vh; height: 100dvh; overflow: hidden;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #000;
        }

        /* 3D背景を背面に固定 */
        #canvas-container {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        /* UI全体のラッパー：クリックを透過させる */
        .ui-wrapper {
            position: relative; z-index: 10;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* 中央のタイマー：クリックを有効にする */
        .center-ui {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 280px; height: 280px;
            background: var(--bg-glass); border-radius: 50%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            pointer-events: auto;
        }

        #progress-svg { position: absolute; top: 0; left: 0; width: 280px; height: 280px; transform: rotate(-90deg); }
        #progress-bg { fill: none; stroke: rgba(43, 0, 128, 0.1); stroke-width: 8; }
        #progress-bar {
            fill: none; stroke: rgba(43, 0, 128, 0.6); stroke-width: 8;
            stroke-linecap: round; stroke-dasharray: 816.8; stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        #status { font-size: 1.6rem; font-weight: 900; color: #000; letter-spacing: 3px; z-index: 11; margin-top: 10px; }
        #timer { font-size: 4rem; font-weight: bold; color: #000; z-index: 11; margin: 5px 0; }
        
        /* 下部の設定エリア：クリックを有効にする */
        .bottom-ui {
            position: absolute; bottom: calc(30px + env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
            width: 100%;
            pointer-events: auto;
        }

        .setting-group {
            display: flex; gap: 10px; background: rgba(255, 255, 255, 0.8);
            padding: 8px 15px; border-radius: 20px; font-weight: bold;
        }
        .setting-group input { width: 40px; height: 30px; border: 1px solid var(--primary-color); border-radius: 5px; text-align: center; }

        .btn {
            background: var(--primary-color); color: #fff; border: none;
            padding: 12px 35px; border-radius: 30px; cursor: pointer;
            font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(43, 0, 128, 0.3);
        }
        #vrmUploadBtn { padding: 8px 20px; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-wrapper">
        <div class="center-ui">
            <svg id="progress-svg">
                <circle id="progress-bg" cx="140" cy="140" r="130"></circle>
                <circle id="progress-bar" cx="140" cy="140" r="130"></circle>
            </svg>
            <div id="status">集中</div>
            <div id="timer">25:00</div>
            <button id="startBtn" class="btn">開始</button>
        </div>

        <div class="bottom-ui">
            <div class="setting-group">
                <label>集中<input type="number" id="workInput" value="25">分</label>
                <label>休憩<input type="number" id="restInput" value="5">分</label>
            </div>
            <button id="vrmUploadBtn" class="btn">アバター変更</button>
        </div>
    </div>

    <input type="file" id="vrmInput" accept=".vrm" style="display: none;">

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.154.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.154.0/examples/jsm/controls/OrbitControls.js",
            "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js",
            "@pixiv/three-vrm-animation": "https://unpkg.com/@pixiv/three-vrm-animation@2.1.0/lib/three-vrm-animation.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';
        import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';

        // 要素の取得
        const startBtn = document.getElementById('startBtn');
        const timerDisplay = document.getElementById('timer');
        const statusDisplay = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const workInput = document.getElementById('workInput');
        const restInput = document.getElementById('restInput');

        let timer = null, timeLeft = 25 * 60, totalTime = 25 * 60;
        let currentVrm = null, mixer = null, animationAction = null;
        let blinkTimer = 0, nextBlinkTime = 2 + Math.random() * 3;

        // Three.js セットアップ
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.3, 3.5);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.3, 0);
        controls.update();

        scene.add(new THREE.DirectionalLight(0xffffff, 1.0), new THREE.AmbientLight(0xffffff, 0.4));

        const loader = new GLTFLoader();
        loader.register((p) => new VRMLoaderPlugin(p));
        loader.register((p) => new VRMAnimationLoaderPlugin(p));

        async function loadVRM(url) {
            try {
                if (currentVrm) scene.remove(currentVrm.scene);
                const gltf = await loader.loadAsync(url);
                currentVrm = gltf.userData.vrm;
                scene.add(currentVrm.scene);
                currentVrm.scene.rotation.y = Math.PI;
                const randomNum = Math.floor(Math.random() * 7) + 1;
                const vrmaGltf = await loader.loadAsync(`motions/VRMA_0${randomNum}.vrma`).catch(() => null);
                if (vrmaGltf) {
                    mixer = new THREE.AnimationMixer(currentVrm.scene);
                    const clip = createVRMAnimationClip(vrmaGltf.userData.vrmAnimations[0], currentVrm);
                    animationAction = mixer.clipAction(clip);
                    animationAction.play();
                }
            } catch (e) { console.error(e); }
        }

        const finishSound = new Audio('sounds/finish.mp3');

        function displayTime() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerDisplay.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            const circumference = 2 * Math.PI * 130;
            const offset = circumference - (timeLeft / totalTime) * circumference;
            progressBar.style.strokeDashoffset = offset;
        }

        const updateInitialTime = () => {
            if (!timer) {
                const workMin = parseInt(workInput.value) || 25;
                const restMin = parseInt(restInput.value) || 5;
                const isRest = statusDisplay.textContent === "休憩";
                totalTime = (isRest ? restMin : workMin) * 60;
                timeLeft = totalTime;
                displayTime();
            }
        };

        workInput.oninput = updateInitialTime;
        restInput.oninput = updateInitialTime;
        document.getElementById('vrmUploadBtn').onclick = () => document.getElementById('vrmInput').click();
        document.getElementById('vrmInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) loadVRM(URL.createObjectURL(file));
        };

        startBtn.onclick = () => {
            finishSound.play().then(() => { finishSound.pause(); finishSound.currentTime = 0; }).catch(() => {});
            if (timer) {
                clearInterval(timer); timer = null;
                startBtn.textContent = "開始";
                if (animationAction) animationAction.stop();
            } else {
                startBtn.textContent = "停止";
                if (animationAction) { animationAction.paused = false; animationAction.play(); }
                timer = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) {
                        clearInterval(timer); timer = null;
                        finishSound.play();
                        if (statusDisplay.textContent === "集中") {
                            statusDisplay.textContent = "休憩"; updateInitialTime();
                            setTimeout(() => { startBtn.click(); }, 3000);
                        } else {
                            statusDisplay.textContent = "集中"; updateInitialTime();
                            startBtn.textContent = "開始";
                        }
                    }
                    displayTime();
                }, 1000);
            }
        };

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            if (currentVrm && currentVrm.expressionManager && statusDisplay.textContent === "集中") {
                blinkTimer += delta;
                if (blinkTimer >= nextBlinkTime) {
                    currentVrm.expressionManager.setValue('blink', 1.0);
                    if (blinkTimer >= nextBlinkTime + 0.1) {
                        currentVrm.expressionManager.setValue('blink', 0.0);
                        blinkTimer = 0; nextBlinkTime = 2 + Math.random() * 3;
                    }
                }
                currentVrm.expressionManager.update();
            }
            if (currentVrm) currentVrm.update(delta);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        loadVRM('avatar/welcomecat.vrm');
        updateInitialTime();
        animate();
    </script>
</body>
</html>
