<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>mateTimer - Custom Version</title>
<style>
/* フォントをゴシック体で統一 */
body {
    margin: 0;
    background-image: url('backimage/back_image.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
}
#canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

/* 中央のタイマー表示エリア（スッキリ化） */
.container { 
    position: relative; 
    z-index: 10; 
    text-align: center; 
    padding: 20px; 
    border: 3px solid rgba(255, 255, 255, 0.8); 
    border-radius: 50%; 
    width: 260px; 
    height: 260px; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    background: rgba(255, 255, 255, 0.6); 
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); 
}
#timer { 
    font-size: 4rem; 
    font-weight: bold; 
    margin: 5px 0; 
    color: #000000; 
    /* タイマー数字のみ視認性の高い等幅フォントを推奨しますが、全体に合わせてゴシックに */
}
#status { 
    font-size: 1.8rem; 
    font-weight: 900;  
    color: #000000;    
    letter-spacing: 3px; 
    margin-bottom: 5px; 
}

/* 下部の設定・操作エリア */
.controls { 
    position: absolute; 
    bottom: 20px; 
    z-index: 20; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 10px; 
    width: 100%; 
}

/* 集中/休憩の設定入力欄（アバター変更ボタンの上に配置） */
.setting-group {
    display: flex;
    gap: 15px;
    background: rgba(255, 255, 255, 0.4);
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: bold;
    color: #000;
}
.setting-group input {
    width: 35px;
    border-radius: 5px;
    border: 1px solid rgba(0, 242, 255, 0.5);
    text-align: center;
    background: white;
    font-weight: bold;
    margin: 0 3px;
}

button { 
    background: #00f2ff; 
    color: #000; 
    border: none; 
    padding: 12px 24px; 
    border-radius: 30px; 
    cursor: pointer; 
    font-weight: bold; 
    font-size: 1.1rem; 
    transition: transform 0.1s; 
    touch-action: manipulation; 
}
button:active { transform: scale(0.95); }

</style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="container">
        <div id="status">集中</div>
        <div id="timer">25:00</div>
        <button id="startBtn">開始</button>
    </div>

    <div class="controls">
        <div class="setting-group">
            <label>集中<input type="number" id="workInput" value="25">分</label>
            <label>休憩<input type="number" id="restInput" value="5">分</label>
        </div>
        <button id="vrmUploadBtn">アバター変更</button>
    </div>
