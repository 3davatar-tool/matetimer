<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>mateTimer - Stable Version</title>
<style>

body {
    margin: 0;
    /* 背景画像の設定 */
    background-image: url('backimage/back_image.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    
    /* 時計を中央に配置するための追加設定 */
    display: flex;
    justify-content: center; /* 横方向の中央 */
    align-items: center;     /* 縦方向の中央 */
    height: 100vh;           /* 画面の高さ一杯を使う */
    
    overflow: hidden;
}

#canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

/* タイマー部分をスマホでも見やすく */
.container { 
    position: relative; 
    z-index: 10; 
    text-align: center; 
    padding: 20px; 
    border: 3px solid rgba(255, 255, 255, 0.8); /* 縁も白っぽく */
    border-radius: 50%; 
    width: 260px; 
    height: 260px; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    background: rgba(255, 255, 255, 0.6); /* ← ここを黒から「透ける白」に変更 */
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); /* 影も白く */
}

#timer { 
    font-size: 4rem; 
    font-weight: bold; 
    margin: 5px 0; 
    color: #000000; /* ← 文字を黒に */
    font-family: 'Courier New', Courier, monospace; 
}

#status { 
    font-size: 1.8rem; /* ← サイズを大きく */
    font-weight: 900;  /* ← 太く */
    color: #000000;    /* ← 文字を黒に */
    letter-spacing: 3px; 
    margin-bottom: 5px; 
    font-family: sans-serif; /* 太ゴシック系 */
}



/* ボタンを指で押しやすく大きく */

button { background: #00f2ff; color: #000; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: transform 0.1s; touch-action: manipulation; }

button:active { transform: scale(0.95); }



/* 下部のコントロールパネル */

.controls { position: absolute; bottom: 30px; z-index: 20; display: flex; gap: 15px; width: 100%; justify-content: center; }

.sub-btn { background: rgba(0, 242, 255, 0.2); color: #00f2ff; border: 1px solid #00f2ff; font-size: 0.9rem; padding: 10px 18px; }

</style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="container">
        <div id="status">集中！</div>
        <div id="timer">25:00</div>
        <button id="startBtn">開始</button>
    </div>
    <div class="controls">
        <button id="vrmUploadBtn">アバター変更</button>
        <button id="pipBtn">小窓モード</button>
    </div>
    <input type="file" id="vrmInput" accept=".vrm" style="display: none;">

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.154.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.154.0/examples/jsm/controls/OrbitControls.js",
            "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js",
            "@pixiv/three-vrm-animation": "https://unpkg.com/@pixiv/three-vrm-animation@2.1.0/lib/three-vrm-animation.module.js"
        }
    }
    </script>

<script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';

        let timer = null, timeLeft = 10 * 1;
        let currentVrm = null, mixer = null, animationAction = null;

        // 3Dシーン
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth/window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.3, 3.5);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.3, 0);
        scene.add(new THREE.DirectionalLight(0xffffff, 1.0), new THREE.AmbientLight(0xffffff, 0.4));

        const loader = new GLTFLoader();
        loader.register((p) => new VRMLoaderPlugin(p));
        loader.register((p) => new VRMAnimationLoaderPlugin(p));

        // アバター読み込み関数
        async function loadVRM(url) {
            console.log("Loading VRM...");
            try {
                if (currentVrm) { scene.remove(currentVrm.scene); }
                const gltf = await loader.loadAsync(url);
                currentVrm = gltf.userData.vrm;
                scene.add(currentVrm.scene);
                currentVrm.scene.rotation.y = Math.PI;

                // モーション　1から7までの数字をランダムに生成
                const randomNum = Math.floor(Math.random() * 7) + 1;
                const motionPath = `motions/VRMA_0${randomNum}.vrma`;
                const vrmaGltf = await loader.loadAsync(motionPath).catch(() => null);
                if (vrmaGltf) {
                    mixer = new THREE.AnimationMixer(currentVrm.scene);
                    const clip = createVRMAnimationClip(vrmaGltf.userData.vrmAnimations[0], currentVrm);
                    animationAction = mixer.clipAction(clip);
                    if (timer) animationAction.play();
                }
                console.log("VRM Loaded!");
            } catch (e) { console.error(e); alert("読み込みエラー"); }
        }

        // 音源の準備
        const finishSound = new Audio('sounds/finish.mp3');
        
        // ボタン操作
        document.getElementById('vrmUploadBtn').onclick = () => document.getElementById('vrmInput').click();
        document.getElementById('vrmInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) loadVRM(URL.createObjectURL(file));
        };

// タイマー開始・停止ボタンの処理
        document.getElementById('startBtn').onclick = () => {
            if (timer) {
                // 停止（キャンセル）処理
                clearInterval(timer); 
                timer = null;
                document.getElementById('startBtn').textContent = "開始";
                if (animationAction) animationAction.stop();
            } else {
                // 開始処理
                document.getElementById('status').textContent = "集中！";
                
                // 表情を真面目な顔に戻す
                if (currentVrm && currentVrm.expressionManager) {
                    currentVrm.expressionManager.setValue('joy', 0.0);
                    currentVrm.expressionManager.update();
                }

                document.getElementById('startBtn').textContent = "停止";
                
                // アニメーションを再開
                if (animationAction) {
                    animationAction.paused = false; // 一時停止を解除
                    animationAction.play();
                }

                // カウントダウン開始
                timer = setInterval(() => {
                    timeLeft--;
                    
                    // 終了判定
                    if (timeLeft <= 0) {
                        clearInterval(timer); 
                        timer = null;
                        finishSound.play(); // 音を鳴らす

                        // 表情を笑顔にする
                        if (currentVrm && currentVrm.expressionManager) {
                            currentVrm.expressionManager.setValue('joy', 1.0);
                            currentVrm.expressionManager.update();
                        }

                        document.getElementById('status').textContent = "お疲れ様！";
                        document.getElementById('startBtn').textContent = "開始";

                        // ポーズを止めたまま笑顔を維持
                        if (animationAction) {
                            animationAction.paused = true; 
                        }

                        timeLeft = 25 * 60; // タイマーをリセット
                    }

                    // 画面表示の更新
                    const m = Math.floor(timeLeft / 60);
                    const s = timeLeft % 60;
                    document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
                }, 1000);
            }
        };
        // ループ
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            if (currentVrm) currentVrm.update(delta);
            renderer.render(scene, camera);
        }
        animate();

        // 小窓
        document.getElementById('pipBtn').onclick = () => {
            window.open(window.location.href.split('?')[0] + '?mode=mini', 'mini', 'width=400,height=500');
        };
    </script>
</body>

</html>
